<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Libby & Sophie’s 30th – Suits & Sparkles</title>

<style>
  :root {
    --bg: #0a0f1c;
    --frost: rgba(255,255,255,0.08);
    --glass: rgba(255,255,255,0.12);
    --accent: #c9e6ff;
    --accent2: #ffb7f5;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --border: rgba(255,255,255,0.15);
  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #1a2337 0, #0a0f1c 60%);
    color: var(--text);
  }

  /* Winter banner */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  header .title {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    text-shadow: 0 0 8px rgba(255,255,255,0.4);
  }

  header .tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    color: var(--accent2);
    border: 1px solid rgba(255,255,255,0.3);
  }

  .container {
    padding: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  .card {
    background: var(--glass);
    border-radius: 14px;
    padding: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 12px;
    color: var(--accent);
  }

  .input-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .input-group {
    flex: 1 1 240px;   /* ensures each box has a minimum width */
    min-width: 240px;  /* prevents shrinking too small */
  }

  .input-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  input[type="number"], input[type="text"], select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th, td {
    padding: 10px 6px;
    text-align: left;
  }

  th {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  tbody tr:nth-child(even) {
    background: rgba(255,255,255,0.03);
  }

  tbody tr:nth-child(odd) {
    background: rgba(255,255,255,0.06);
  }

  .name-cell {
    font-weight: 500;
  }

  .cost-cell {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .summary-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .summary-item {
    flex: 1;
    min-width: 160px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
  }

  .summary-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .summary-value {
    font-size: 15px;
    font-weight: 500;
  }

  .summary-highlight {
    color: var(--accent2);
  }
</style>
</head>

<body>

<header>
  <div class="title">Libby & Sophie’s 30th – Suits & Sparkles ❄️✨</div>
  <div class="tag">Winter Weekend</div>
</header>

<div class="container">

  <!-- Trip settings -->
  <div class="card">
    <div class="card-title">Trip Settings</div>

    <div class="input-row">
      <div class="input-group">
        <div class="input-label">Total Rental Cost (£)</div>
        <input type="number" id="totalCost" value="2606" min="0" oninput="updateTotals()">
      </div>

      <div class="input-group">
        <div class="input-label">Average Cost Per Night (£)</div>
        <input type="text" id="avgCostPerNight" readonly>
      </div>
    </div>

    <div class="summary-row">
      <div class="summary-item">
        <div class="summary-label">Confirmed Guests (Y)</div>
        <div class="summary-value" id="confirmedCount">0</div>
      </div>

      <div class="summary-item">
        <div class="summary-label">Total Nights (Y only)</div>
        <div class="summary-value" id="totalNights">0</div>
      </div>

      <div class="summary-item">
        <div class="summary-label">Total Cost Checked</div>
        <div class="summary-value summary-highlight">£<span id="totalCostCheck">0</span></div>
      </div>
    </div>
  </div>

  <!-- People table -->
  <div class="card">
    <div class="card-title">Guests & Costs</div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Status</th>
          <th>Nights</th>
          <th style="text-align:right;">Cost (£)</th>
        </tr>
      </thead>
      <tbody id="peopleTable"></tbody>
    </table>
  </div>

</div>

<script>
const peopleData = [
  { name: "Chris H", nights: 2, status: "Y" },
  { name: "Mabs", nights: 2, status: "Y" },
  { name: "Emily", nights: 2, status: "Y" },
  { name: "Matt S", nights: 2, status: "N" },
  { name: "Chris P", nights: 2, status: "Y" },
  { name: "Libby", nights: 2, status: "Y" },
  { name: "Sophie", nights: 2, status: "Y" },
  { name: "Anna D", nights: 2, status: "Y" },
  { name: "Iris", nights: 2, status: "Y" },
  { name: "Will", nights: 2, status: "Y" },
  { name: "Amy B Boyfriend", nights: 2, status: "Y" },
  { name: "Amy B", nights: 2, status: "Y" },
  { name: "Alice", nights: 1, status: "Y" },
  { name: "Hayden", nights: 1, status: "Y" },
  { name: "Jack", nights: 2, status: "TBD" },
  { name: "Emma", nights: 2, status: "TBD" },
  { name: "Matt E", nights: 2, status: "TBD" },
  { name: "Nick", nights: 2, status: "TBD" }
];

function renderTable() {
  const table = document.getElementById("peopleTable");
  table.innerHTML = "";

  peopleData.forEach((p, i) => {
    table.innerHTML += `
      <tr>
        <td class="name-cell">${p.name}</td>
        <td>
          <select onchange="updateStatus(${i}, this.value)">
            <option value="Y" ${p.status==="Y"?"selected":""}>Y</option>
            <option value="N" ${p.status==="N"?"selected":""}>N</option>
            <option value="TBD" ${p.status==="TBD"?"selected":""}>TBD</option>
          </select>
        </td>
        <td>
          <select onchange="updateNights(${i}, this.value)">
            <option value="1" ${p.nights===1?"selected":""}>1 night</option>
            <option value="2" ${p.nights===2?"selected":""}>2 nights</option>
          </select>
        </td>
        <td class="cost-cell">£<span id="cost-${i}">0.00</span></td>
      </tr>
    `;
  });
}

function updateStatus(i, value) {
  peopleData[i].status = value;
  updateTotals();
}

function updateNights(i, value) {
  peopleData[i].nights = Number(value);
  updateTotals();
}

function updateTotals() {
  const totalCost = Number(document.getElementById("totalCost").value);

  const confirmed = peopleData.filter(p => p.status === "Y");
  const totalNights = confirmed.reduce((sum, p) => sum + p.nights, 0);

  const avgCostPerNight = totalNights > 0 ? (totalCost / totalNights) : 0;

  document.getElementById("confirmedCount").innerText = confirmed.length;
  document.getElementById("totalNights").innerText = totalNights;
  document.getElementById("avgCostPerNight").value = avgCostPerNight.toFixed(2);

  let totalCostCheck = 0;
  peopleData.forEach((p, i) => {
    let personCost = 0;
    if (p.status === "Y") {
      personCost = p.nights * avgCostPerNight;
      totalCostCheck += personCost;
    }
    document.getElementById(`cost-${i}`).innerText = personCost.toFixed(2);
  });

  document.getElementById("totalCostCheck").innerText = totalCostCheck.toFixed(2);
}

renderTable();
updateTotals();
</script>

</body>
</html>
