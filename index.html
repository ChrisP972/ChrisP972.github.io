<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Libby's 30th Party Cost Calculator</title>

<style>
  body {
    font-family: 'Arial';
    background: linear-gradient(135deg, #ff9ec4, #ffd3a5);
    margin: 0;
    padding: 0;
  }

  header {
    background: #ff4f81;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .container {
    padding: 20px;
  }

  .input-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  th, td {
    padding: 10px;
    text-align: center;
  }

  th {
    background: #ff4f81;
    color: white;
  }

  tr:nth-child(even) {
    background: #ffe6f0;
  }

  select, input {
    padding: 6px;
    width: 90%;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  .summary {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .summary h2 {
    margin-top: 0;
  }
</style>
</head>

<body>

<header>🎉 Libby's 30th Birthday Cost Calculator 🎉</header>

<div class="container">

  <div class="input-box">
    <label><strong>Total Rental Cost (£):</strong></label>
    <input type="number" id="totalCost" value="2606" oninput="updateTotals()">
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Status</th>
        <th>Nights</th>
      </tr>
    </thead>
    <tbody id="peopleTable"></tbody>
  </table>

  <div class="summary">
    <h2>Summary</h2>
    <p><strong>Total Nights:</strong> <span id="totalNights">0</span></p>
    <p><strong>Cost Per Person:</strong> £<span id="costPerPerson">0</span></p>
    <p><strong>Cost Per Person Per Night:</strong> £<span id="costPerNight">0</span></p>
  </div>

</div>

<script>
const peopleData = [
  { name: "Chris H", nights: 2, status: "Y" },
  { name: "Mabs", nights: 2, status: "Y" },
  { name: "Emily", nights: 2, status: "Y" },
  { name: "Matt S", nights: 0, status: "N" },
  { name: "Chris P", nights: 2, status: "Y" },
  { name: "Libby", nights: 2, status: "Y" },
  { name: "Sophie", nights: 2, status: "Y" },
  { name: "Anna D", nights: 2, status: "Y" },
  { name: "Iris", nights: 2, status: "Y" },
  { name: "Will", nights: 2, status: "Y" },
  { name: "Amy B Boyfriend", nights: 2, status: "Y" },
  { name: "Amy B", nights: 2, status: "Y" },
  { name: "Alice", nights: 1, status: "Y" },
  { name: "Hayden", nights: 1, status: "Y" },
  { name: "Jack", nights: 2, status: "TBD" },
  { name: "Emma", nights: 2, status: "TBD" },
  { name: "Matt E", nights: 2, status: "TBD" },
  { name: "Nick", nights: 2, status: "TBD" }
];

function renderTable() {
  const table = document.getElementById("peopleTable");
  table.innerHTML = "";

  peopleData.forEach((p, i) => {
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>
          <select onchange="updateStatus(${i}, this.value)">
            <option value="Y" ${p.status==="Y"?"selected":""}>Y</option>
            <option value="N" ${p.status==="N"?"selected":""}>N</option>
            <option value="TBD" ${p.status==="TBD"?"selected":""}>TBD</option>
          </select>
        </td>
        <td>
          <input type="number" min="0" value="${p.nights}" onchange="updateNights(${i}, this.value)">
        </td>
      </tr>
    `;
  });
}

function updateStatus(i, value) {
  peopleData[i].status = value;
  updateTotals();
}

function updateNights(i, value) {
  peopleData[i].nights = Number(value);
  updateTotals();
}

function updateTotals() {
  const totalCost = Number(document.getElementById("totalCost").value);

  const confirmed = peopleData.filter(p => p.status === "Y");
  const totalNights = confirmed.reduce((sum, p) => sum + p.nights, 0);

  const costPerPerson = confirmed.length > 0 ? (totalCost / confirmed.length).toFixed(2) : 0;
  const costPerNight = totalNights > 0 ? (totalCost / totalNights).toFixed(2) : 0;

  document.getElementById("totalNights").innerText = totalNights;
  document.getElementById("costPerPerson").innerText = costPerPerson;
  document.getElementById("costPerNight").innerText = costPerNight;
}

renderTable();
updateTotals();
</script>

</body>
</html>
